name: Release to PyPI

# Trusted publishing: no API token is ever created or stored anywhere.
# Configure the PyPI trusted publisher for owner OIA-LAB, repository
# apl-sidecar, workflow release.yml, environment pypi before the first tag.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
          if-no-files-found: error

  installed-wheel-smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/
      - run: python scripts/smoke_installed_wheel.py dist

  publish:
    needs: installed-wheel-smoke
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/